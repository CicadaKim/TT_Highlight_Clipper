<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: transparent; }
  .container { position: relative; display: inline-block; user-select: none; }
  .container img { display: block; max-width: 100%; cursor: crosshair; }
  .point {
    position: absolute; width: 20px; height: 20px;
    border-radius: 50%; border: 2px solid #fff;
    transform: translate(-50%, -50%);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: bold; color: #fff;
    pointer-events: none; text-shadow: 0 0 3px #000;
  }
  .line-overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
  .toolbar { padding: 6px 0; display: flex; gap: 8px; align-items: center; }
  .toolbar button {
    padding: 4px 14px; border: 1px solid #ccc; border-radius: 4px;
    background: #f8f8f8; cursor: pointer; font-size: 13px;
  }
  .toolbar button:hover { background: #e8e8e8; }
  .toolbar button:disabled { opacity: .4; cursor: default; }
  .status { font-size: 13px; color: #666; margin-left: 8px; }
</style>
</head>
<body>
<div class="toolbar">
  <button id="btnUndo">Undo</button>
  <button id="btnReset">Reset</button>
  <span class="status" id="status"></span>
</div>
<div class="container" id="container">
  <img id="img" />
  <svg class="line-overlay" id="svg"></svg>
</div>

<script>
/* ── Streamlit Component Communication ───────────────────────────── */
function sendValue(val) {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage(
      { type: "streamlit:setComponentValue", value: val }, "*"
    );
  }
}
function setFrameHeight(h) {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage(
      { type: "streamlit:setFrameHeight", height: h }, "*"
    );
  }
}

const COLORS = ["#ff4b4b", "#4bff4b", "#4b8bff", "#ffff4b"];
const MAX_PTS = 4;

let points = [];       // [{x, y}] in original-image coordinates
let scale = 1;
let imgLoaded = false;
let initialized = false;  // true after first args received & image loaded
let currentSrc = "";

const img = document.getElementById("img");
const container = document.getElementById("container");
const svg = document.getElementById("svg");
const statusEl = document.getElementById("status");
const btnUndo = document.getElementById("btnUndo");
const btnReset = document.getElementById("btnReset");

/* ── Draw UI (no Streamlit communication here) ───────────────────── */
function draw() {
  // Clear old markers
  container.querySelectorAll(".point").forEach(el => el.remove());

  if (!imgLoaded) return;
  scale = img.clientWidth / img.naturalWidth;

  // Draw numbered point markers
  points.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "point";
    div.style.left = (p.x * scale) + "px";
    div.style.top  = (p.y * scale) + "px";
    div.style.background = COLORS[i];
    div.textContent = String(i);
    container.appendChild(div);
  });

  // Draw polygon lines
  const dw = img.clientWidth, dh = img.clientHeight;
  svg.setAttribute("width", dw);
  svg.setAttribute("height", dh);
  svg.innerHTML = "";
  if (points.length >= 2) {
    let d = points.map((p, i) =>
      `${i === 0 ? "M" : "L"}${p.x * scale},${p.y * scale}`
    ).join(" ");
    if (points.length === MAX_PTS) d += " Z";
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d);
    path.setAttribute("stroke", "#00ff00");
    path.setAttribute("stroke-width", "2");
    path.setAttribute("fill", points.length === MAX_PTS ? "rgba(0,255,0,0.12)" : "none");
    svg.appendChild(path);
  }

  // Status text
  if (points.length < MAX_PTS) {
    statusEl.textContent = `Click point ${points.length} of ${MAX_PTS}`;
  } else {
    statusEl.textContent = "4 points set — Save Table ROI to apply";
  }
  btnUndo.disabled = points.length === 0;
}

/* ── Notify Streamlit only on user action ────────────────────────── */
function emitPoints() {
  sendValue({
    points: points.map(p => [Math.round(p.x), Math.round(p.y)]),
    complete: points.length === MAX_PTS,
  });
}

/* ── User interactions ───────────────────────────────────────────── */
img.addEventListener("click", (e) => {
  if (points.length >= MAX_PTS) return;
  const rect = img.getBoundingClientRect();
  const dx = e.clientX - rect.left;
  const dy = e.clientY - rect.top;
  points.push({ x: dx / scale, y: dy / scale });
  draw();
  emitPoints();
});

btnUndo.addEventListener("click", () => {
  points.pop();
  draw();
  emitPoints();
});

btnReset.addEventListener("click", () => {
  points = [];
  draw();
  emitPoints();
});

/* ── Receive args from Streamlit ─────────────────────────────────── */
window.addEventListener("message", (event) => {
  const data = event.data;
  if (!data || data.type !== "streamlit:render") return;

  const args = data.args || {};

  // Set image source only once (avoid reload loop)
  if (args.image_b64 && args.image_b64 !== currentSrc) {
    currentSrc = args.image_b64;
    img.src = currentSrc;
  }

  // Load initial points only on the very first render
  if (!initialized && args.initial_points) {
    const ip = args.initial_points;
    if (Array.isArray(ip) && ip.length > 0) {
      points = ip.map(p => ({ x: p[0], y: p[1] }));
    }
    initialized = true;
    if (imgLoaded) draw();
  }
});

img.addEventListener("load", () => {
  imgLoaded = true;
  draw();
  // Set frame height once after image loads
  setTimeout(() => setFrameHeight(document.body.scrollHeight + 10), 100);
});

window.addEventListener("resize", () => {
  if (imgLoaded) draw();
});

// Tell Streamlit we're ready
if (window.parent && window.parent !== window) {
  window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");
}
</script>
</body>
</html>
