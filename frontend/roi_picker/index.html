<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: transparent; }
  .container { position: relative; display: inline-block; user-select: none; }
  .container img { display: block; max-width: 100%; cursor: crosshair; }
  .point {
    position: absolute; width: 20px; height: 20px;
    border-radius: 50%; border: 2px solid #fff;
    transform: translate(-50%, -50%);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: bold; color: #fff;
    pointer-events: none; text-shadow: 0 0 3px #000;
  }
  .line-overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
  .toolbar { padding: 6px 0; display: flex; gap: 8px; align-items: center; }
  .toolbar button {
    padding: 4px 14px; border: 1px solid #ccc; border-radius: 4px;
    background: #f8f8f8; cursor: pointer; font-size: 13px;
  }
  .toolbar button:hover { background: #e8e8e8; }
  .toolbar button:disabled { opacity: .4; cursor: default; }
  .status { font-size: 13px; color: #888; margin-left: 8px; }
</style>
</head>
<body>
<div class="toolbar">
  <button id="btnUndo">Undo</button>
  <button id="btnReset">Reset</button>
  <span class="status" id="status"></span>
</div>
<div class="container" id="container">
  <img id="img" />
  <svg class="line-overlay" id="svg"></svg>
</div>

<script>
/* ── Streamlit postMessage helpers (same protocol as video_editor) ── */
function sendMsg(type, data) {
  window.parent.postMessage(
    Object.assign({ isStreamlitMessage: true, type: type }, data), "*"
  );
}
function setComponentReady() {
  sendMsg("streamlit:componentReady", { apiVersion: 1 });
}
function setComponentValue(val) {
  sendMsg("streamlit:setComponentValue", { value: val });
}
function setFrameHeight(h) {
  h = h || document.body.scrollHeight;
  if (h < 100) h = 400;
  sendMsg("streamlit:setFrameHeight", { height: h });
}

/* ── State ───────────────────────────────────────────────────────── */
const COLORS = ["#ff4b4b", "#4bff4b", "#4b8bff", "#ffff4b"];
const MAX_PTS = 4;

let points = [];
let scale = 1;
let imgLoaded = false;
let initialized = false;
let currentSrc = "";

const img      = document.getElementById("img");
const ctr      = document.getElementById("container");
const svg      = document.getElementById("svg");
const statusEl = document.getElementById("status");
const btnUndo  = document.getElementById("btnUndo");
const btnReset = document.getElementById("btnReset");

/* ── Draw (pure UI, no Streamlit side-effects) ───────────────────── */
function draw() {
  ctr.querySelectorAll(".point").forEach(el => el.remove());
  if (!imgLoaded) return;
  scale = img.clientWidth / img.naturalWidth;

  points.forEach((p, i) => {
    const d = document.createElement("div");
    d.className = "point";
    d.style.left = (p.x * scale) + "px";
    d.style.top  = (p.y * scale) + "px";
    d.style.background = COLORS[i];
    d.textContent = String(i);
    ctr.appendChild(d);
  });

  const w = img.clientWidth, h = img.clientHeight;
  svg.setAttribute("width", w);
  svg.setAttribute("height", h);
  svg.innerHTML = "";
  if (points.length >= 2) {
    let d = points.map((p, i) =>
      `${i === 0 ? "M" : "L"}${p.x * scale},${p.y * scale}`
    ).join(" ");
    if (points.length === MAX_PTS) d += " Z";
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d);
    path.setAttribute("stroke", "#00ff00");
    path.setAttribute("stroke-width", "2");
    path.setAttribute("fill", points.length === MAX_PTS ? "rgba(0,255,0,0.12)" : "none");
    svg.appendChild(path);
  }

  statusEl.textContent = points.length < MAX_PTS
    ? `Click point ${points.length} of ${MAX_PTS}`
    : "4 points set — Save Table ROI to apply";
  btnUndo.disabled = points.length === 0;
}

/* ── Emit to Streamlit (only on user action) ─────────────────────── */
function emitPoints() {
  setComponentValue({
    points: points.map(p => [Math.round(p.x), Math.round(p.y)]),
    complete: points.length === MAX_PTS,
  });
}

/* ── User interactions ───────────────────────────────────────────── */
img.addEventListener("click", (e) => {
  if (points.length >= MAX_PTS) return;
  const r = img.getBoundingClientRect();
  points.push({ x: (e.clientX - r.left) / scale, y: (e.clientY - r.top) / scale });
  draw();
  emitPoints();
});

btnUndo.addEventListener("click", () => { points.pop(); draw(); emitPoints(); });
btnReset.addEventListener("click", () => { points = []; draw(); emitPoints(); });

/* ── Receive render args from Streamlit ──────────────────────────── */
window.addEventListener("message", (event) => {
  const data = event.data;
  if (!data || data.type !== "streamlit:render") return;
  const args = data.args || {};

  // Set image only once
  if (args.image_b64 && args.image_b64 !== currentSrc) {
    currentSrc = args.image_b64;
    img.src = currentSrc;
  }

  // Load initial points only on very first render
  if (!initialized) {
    initialized = true;
    if (args.initial_points && Array.isArray(args.initial_points) && args.initial_points.length > 0) {
      points = args.initial_points.map(p => ({ x: p[0], y: p[1] }));
    }
    if (imgLoaded) draw();
  }
});

img.addEventListener("load", () => {
  imgLoaded = true;
  draw();
  setTimeout(() => setFrameHeight(), 100);
});

window.addEventListener("resize", () => { if (imgLoaded) draw(); });

// Ready
setComponentReady();
</script>
</body>
</html>
