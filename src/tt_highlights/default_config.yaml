runtime:
  device: cuda          # "auto" | "cpu" | "cuda" | "cuda:0" etc.
  gpu_batch_size: 16
  num_decode_workers: 2
  prefer_nvenc: true    # use NVENC for ffmpeg export when available

video:
  proxy_height: 720
  proxy_fps: 30
  warp_width: 640
  warp_height: 356
  activity_fps: 15

audio:
  model_sr: 32000
  hop_sec: 0.1
  impact_threshold: 0.04
  impact_min_distance_sec: 0.12
  cheer_threshold: 0.05
  cheer_merge_gap_sec: 0.4
  cheer_min_len_sec: 0.5
  impact_label_contains: ["Knock", "Tap", "Click", "Slap", "Thump", "Bang", "Ping", "Slam", "Bounce", "Table tennis"]
  cheer_label_contains: ["Cheering", "Applause", "Crowd"]
  clap_label_contains: ["Clapping"]

segmentation:
  impact_gap_max_sec: 3.5
  min_impacts: 2
  min_rally_duration_sec: 2.5
  end_grace_sec: 1.8
  activity_min_mean: 0.05
  split_min_duration_sec: 5.0
  split_activity_max: 0.025
  split_min_window_sec: 1.0
  impact_score_floor: 0.04
  gap_multiplier: 2.5
  gap_min_sec: 2.0
  merge_gap_sec: 1.0
  boundary_look_back_sec: 2.0
  boundary_look_fwd_sec: 1.0
  boundary_grad_threshold: 0.02
  conf_video_floor: 0.03
  conf_video_ceil: 0.12
  require_video_confirmation: false
  video_confirm_window_sec: 0.5
  video_confirm_threshold: 0.03
  ball_conf_weight: 0.15
  motion_conf_weight: 0.10
  ball_conf_window_sec: 0.5
  motion_conf_threshold: 2.0

ocr:
  enabled: true
  sample_fps: 5
  window_pre_sec: 1.0
  window_post_sec: 2.0
  whitelist: "0123456789"

ball:
  enabled: true
  detection_fps: 30
  diff_threshold: 25
  min_area: 20
  max_area: 260
  min_circularity: 0.45
  max_aspect_ratio: 1.8
  max_jump_px: 45
  max_misses: 7
  quality_min_ratio: 0.4

player_zones:
  enabled: true
  auto_derive: true     # auto-derive from table polygon short edges
  margin_px: 150        # zone expansion beyond table edge (or 20% of frame height)
  sample_fps: 10

player_motion:
  enabled: true
  sample_fps: 10
  smoothing_window: 5

pose_estimation:
  enabled: true         # requires ultralytics (GPU extras)
  model_size: "s"       # "n" (nano) or "s" (small, more accurate)
  sample_fps: 5         # YOLO is heavier than motion, so lower
  conf_threshold: 0.5   # person detection minimum confidence
  swing_speed_norm: "shoulder_width"
  swing_speed_threshold: 0.8
  smoothing_window: 3

clips:
  total: 10
  quotas:
    long_rally: 4
    impact: 3
    reaction: 3
  length_sec: 20.0
  pre_roll_sec: 1.0
  post_roll_sec: 1.5
  overlap_sec: 2.0

export:
  gif_enabled: true
  gif_width: 640
  gif_fps: 20

highlights:
  auto_threshold: 0.4
  video_floor: 0.03

scoring:
  normalization:
    clip_percentile_low: 5
    clip_percentile_high: 95
  minimums:
    segment_score: 0.15
    category_score: 0.1
  weights:
    long_rally:
      duration: 1.0
      impact_count: 0.7
      activity_mean: 0.5
      ball_coverage_entropy: 0.4
      wrist_speed_mean: 0.0    # pose: enable after validation
    impact:
      impact_peak: 1.2
      activity_peak: 0.8
      ball_speed_peak: 0.9
      ball_accel_spikes: 0.5
      wrist_speed_peak: 0.0   # pose: enable after validation
      arm_extension_peak: 0.0 # pose: enable after validation
    reaction:
      cheer_near_end: 1.5
      ocr_score_change: 1.8
      post_pause: 0.4
      pose_asymmetry: 0.0     # pose: enable after validation
